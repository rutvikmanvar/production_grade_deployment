name: server-application-a

services:
  api-service:
    build: 
      context: .
      dockerfile: Dockerfile
    deploy:
      replicas: 5
    networks:
      - internal

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.my-router.rule=Host(`server-application-a.local`)"
      - "traefik.http.services.my-router.loadbalancer.server.port=80"
      - "traefik.http.routers.my-router.entrypoints=web,websecure"
      - "traefik.docker.network=project-a-network"
      - "traefik.http.routers.my-router.tls=true"
      - "traefik.http.routers.my-router.tls.certresolver=cert-resolver"
    networks:
      - project-a-network
      - internal

networks:
  internal:
    driver: bridge
  project-a-network:
    external: true